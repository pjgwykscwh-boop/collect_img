name: 采集验证码裁剪图

on:
  workflow_dispatch:   # 手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 最长5小时

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Python依赖
        run: |
          pip install ddddocr pillow selenium webdriver-manager

      - name: 安装Chrome
        uses: browser-actions/setup-chrome@v1

      - name: 运行采集脚本
        env:
          LIB_ACCOUNT:   ${{ secrets.LIB_ACCOUNT }}
          LIB_PASSWORD:  ${{ secrets.LIB_PASSWORD }}
          QQ_ADDR:       ${{ secrets.QQ_ADDR }}
          QQ_SMTP_PASS:  ${{ secrets.QQ_SMTP_PASS }}
        run: |
          python collect_crops.py
